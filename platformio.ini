; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; pio pkg install --tool tool-mkspiffs
;
;
;   Fix: Install intelhex for PlatformIO's Python
;	---------------------------------------------
; On platform = espressif32@6.12.0 install intelhex into THAT Python
;
;  In the terminal, run:
;
;  "C:\Users\<you>\.platformio\penv\Scripts\python.exe" -m pip install intelhex
;
;
;    (Replace the path with your actual one.)
; 
;  If you're on macOS/Linux:
;
;  ~/.platformio/penv/bin/python -m pip install intelhex
;



[platformio]
description = ESP32-A1S MQTT Audio-Message Player for Homey Pro over Smart Homes-Hubs
default_envs = esp32dev


[env:esp32dev]
platform = espressif32  ;@6.7.0  ; 6.3.2
board = esp32dev
framework = arduino
build_flags = -DAUDIOKIT_BOARD=5 -DCORE_DEBUG_LEVEL=5 -Wno-unused-variable -Wno-unused-but-set-variable -Wno-unused-function -Wno-format-extra-args
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = huge_app.csv
board_build.arduino.upstream_packages = no
lib_deps = 
	Wire
	https://github.com/pschatzmann/arduino-audio-tools.git
	https://github.com/pschatzmann/arduino-audio-driver.git
	https://github.com/pschatzmann/arduino-libhelix.git
	https://github.com/knolleary/pubsubclient.git
	https://github.com/xreef/SimpleFTPServer.git
	https://github.com/sinricpro/Arduino-QueueList.git
	https://github.com/nickgammon/Regexp.git
	https://github.com/fbiego/ESP32Time.git
	https://github.com/marian-craciunescu/ESP32Ping.git
	https://github.com/bblanchon/ArduinoJson.git
	https://github.com/pschatzmann/arduino-SAM.git
	
;port = /dev/cu.usbserial-0001
upload_port = COM4


